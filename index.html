<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuis Spesial buat Aynna</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6f2; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Biar pas tombol Tidak membesar, layar gak muncul scroll */
            text-align: center;
        }

        #quiz-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 500px;
            z-index: 10;
            position: relative;
        }

        h1 {
            color: #ff4d94;
            font-size: clamp(20px, 5vw, 28px); /* Responsif menyesuaikan layar */
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease; /* Transisi membesar */
        }

        #btn-ya {
            background-color: #ffb3d1;
            color: white;
            z-index: 9999; /* Biar selalu di atas pas lari-lari */
            transition: left 0.2s ease, top 0.2s ease; /* Biar gesernya mulus */
        }

        #btn-tidak {
            background-color: #99ccff;
            color: white;
            z-index: 50;
            position: relative;
            transform-origin: center; /* Membesar dari tengah */
        }

        #result {
            display: none;
            font-size: clamp(24px, 6vw, 32px);
            color: #ff4d94;
            font-weight: bold;
            padding: 20px;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div id="quiz-container">
        <h1 id="question">Pertanyaan 1</h1>
        <div class="btn-container">
            <button id="btn-ya" onclick="nextQuestion('ya')">Ya</button>
            <button id="btn-tidak" onclick="nextQuestion('tidak')">Tidak</button>
        </div>
    </div>

    <div id="result">
        Hehehe bener banget! Aynna gak cabi kok, tapi imuttt! 💖✨
    </div>

    <script>
        const questions = [
            "Apakah kamu suka jalan-jalan?",
            "Apakah es krim rasanya manis?",
            "Apakah aynna cabiii?"
        ];

        let currentQuestionIndex = 0;
        let scaleTidak = 1; 

        const questionEl = document.getElementById("question");
        const btnYa = document.getElementById("btn-ya");
        const btnTidak = document.getElementById("btn-tidak");
        const quizContainer = document.getElementById("quiz-container");
        const resultEl = document.getElementById("result");

        // Tampilkan pertanyaan pertama
        questionEl.innerText = questions[currentQuestionIndex];

        function nextQuestion(answer) {
            // Kalau sudah di pertanyaan "Apakah Aynna cabiii?" dan jawab "Tidak"
            if (currentQuestionIndex === 2) {
                if (answer === 'tidak') {
                    quizContainer.style.display = "none";
                    btnYa.style.display = "none"; // Hilangkan tombol Ya juga
                    resultEl.style.display = "block";
                }
                return; 
            }

            // Lanjut pertanyaan
            currentQuestionIndex++;
            questionEl.innerText = questions[currentQuestionIndex];

            // Setup jebakan di pertanyaan ke-3
            if (currentQuestionIndex === 2) {
                setupTrick();
            }
        }

        function setupTrick() {
            // Ubah posisi jadi fixed biar bisa pindah se-layar tanpa mengubah layout container
            btnYa.style.position = "fixed";
            
            // Setel posisi awal sesuai posisinya saat ini biar gak kaget lompat dulu
            const rect = btnYa.getBoundingClientRect();
            btnYa.style.left = rect.left + "px";
            btnYa.style.top = rect.top + "px";

            // Event listener untuk kabur (berlaku di laptop dan HP)
            btnYa.addEventListener("mouseover", runawayBtn);
            btnYa.addEventListener("touchstart", runawayBtn, {passive: false});
        }

        function runawayBtn(e) {
            if(e.type === 'touchstart') e.preventDefault(); 

            // Hitung ruang aman agar tombol tidak keluar layar
            const safeWidth = window.innerWidth - btnYa.offsetWidth - 20;
            const safeHeight = window.innerHeight - btnYa.offsetHeight - 20;

            // Generate posisi X dan Y secara acak
            const randomX = Math.max(10, Math.floor(Math.random() * safeWidth));
            const randomY = Math.max(10, Math.floor(Math.random() * safeHeight));

            btnYa.style.left = randomX + "px";
            btnYa.style.top = randomY + "px";

            // Bikin tombol Tidak makin raksasa
            scaleTidak += 0.8; // Ukurannya nambah lebih drastis biar cepat penuh
            btnTidak.style.transform = `scale(${scaleTidak})`;
        }
    </script>

</body>
</html>
