<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuis Spesial buat Raynna</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #ffe6f2; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; 
            text-align: center;
        }

        /* --- STYLING LOADING SCREEN --- */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #ffe6f2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999; /* Paling atas nutupin kuis */
            transition: opacity 0.8s ease-out, visibility 0.8s ease-out;
        }

        .loading-heart {
            width: 100px;
            height: 100px;
            /* SVG Heart warna pink muda (kosong) */
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ffb3d1"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') no-repeat center;
            background-size: cover;
            position: relative;
        }

        .loading-heart-fill {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%;
            /* SVG Heart warna pink tua (isi) */
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23ff4d94"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>') no-repeat bottom left;
            background-size: 100px 100px;
            /* Animasi ngisi dari bawah ke atas selama 2 detik */
            animation: fillHeartAnim 2s ease-in-out forwards; 
        }

        @keyframes fillHeartAnim {
            0% { height: 0%; }
            100% { height: 100%; }
        }

        #loading-name {
            margin-top: 25px;
            font-size: clamp(24px, 6vw, 36px);
            font-weight: bold;
            color: #ff4d94;
            opacity: 0;
            transform: translateY(20px);
            /* Animasi teks muncul setelah love penuh (delay 2s) */
            animation: revealText 1s ease-out 2s forwards; 
            padding: 0 15px;
        }

        @keyframes revealText {
            to { opacity: 1; transform: translateY(0); }
        }


        /* --- STYLING KUIS --- */
        #score-board {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #ff4d94;
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            z-index: 100;
        }

        #quiz-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 500px;
            z-index: 10;
            position: relative;
        }

        h1 {
            color: #ff4d94;
            font-size: clamp(20px, 5vw, 28px); 
            margin-bottom: 30px;
        }

        .btn-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
        }

        button {
            padding: 12px 30px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: bold;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.3s ease, background-color 0.3s ease; 
        }

        #btn-ya, #btn-tidak {
            position: relative;
            z-index: 50;
            transform-origin: center;
        }

        #btn-ya { background-color: #ffb3d1; color: white; }
        #btn-ya:hover { background-color: #ff80b3; }

        #btn-tidak { background-color: #99ccff; color: white; }
        #btn-tidak:hover { background-color: #66b3ff; }

        #result {
            display: none;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            width: 85%;
            max-width: 500px;
            z-index: 10000;
        }

        #result p {
            font-size: clamp(20px, 5vw, 28px);
            color: #ff4d94;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #btn-lanjut {
            background-color: #ff4d94;
            color: white;
            padding: 15px 40px;
            font-size: 18px;
            width: 100%;
        }
        #btn-lanjut:hover { background-color: #e6005c; }

    </style>
</head>
<body>

    <div id="loading-screen">
        <div class="loading-heart">
            <div class="loading-heart-fill"></div>
        </div>
        <div id="loading-name">Raynna Valenty Angeline ✨</div>
    </div>

    <div id="score-board">Skor: <span id="score">0</span></div>

    <div id="quiz-container">
        <h1 id="question">Pertanyaan 1</h1>
        <div class="btn-container">
            <button id="btn-ya" onclick="answer('ya')">Ya</button>
            <button id="btn-tidak" onclick="answer('tidak')">Tidak</button>
        </div>
    </div>

    <div id="result">
        <p id="result-text"></p>
        <button id="btn-lanjut" onclick="lanjutQuiz()">Lanjut Quiz (Ya)</button>
    </div>

    <script>
        // --- LOGIKA LOADING SCREEN ---
        window.addEventListener("load", function() {
            const loadingScreen = document.getElementById("loading-screen");
            
            // Tunggu 4.5 detik (2s love ngisi + 1s nama muncul + 1.5s diliat dulu)
            setTimeout(() => {
                loadingScreen.style.opacity = "0";
                loadingScreen.style.visibility = "hidden";
            }, 4500);
        });

        // --- LOGIKA KUIS ---
        const questions = [
            "Apakah kamu suka jalan-jalan?",
            "Apakah es krim rasanya manis?",
            "Apakah aynna cabiii?",
            "Apakah bumi itu bulat?",
            "Apakah air laut itu asin?",
            "Akuu jemputt kamuu teruss yaaa"
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let scaleMembesar = 1; 

        const questionEl = document.getElementById("question");
        const btnYa = document.getElementById("btn-ya");
        const btnTidak = document.getElementById("btn-tidak");
        const quizContainer = document.getElementById("quiz-container");
        const resultEl = document.getElementById("result");
        const resultText = document.getElementById("result-text");
        const btnLanjut = document.getElementById("btn-lanjut");
        const scoreEl = document.getElementById("score");

        questionEl.innerText = questions[currentQuestionIndex];

        function answer(pilihan) {
            score += 20;
            scoreEl.innerText = score;

            // Jebakan Q3
            if (currentQuestionIndex === 2) {
                if (pilihan === 'tidak') {
                    quizContainer.style.display = "none";
                    resultEl.style.display = "block";
                    resultText.innerText = "Hehehe bener banget! Aynna gak cabi kok, tapi imuttt! 💖✨";
                    btnLanjut.style.display = "inline-block";
                }
                return; 
            }

            // Jebakan Q6
            if (currentQuestionIndex === 5) {
                if (pilihan === 'ya') {
                    quizContainer.style.display = "none";
                    resultEl.style.display = "block";
                    resultText.innerText = "Asiikkk! Tungguin aku jemput terus yaa cintaa! 🚗💨💖";
                    btnLanjut.style.display = "none"; 
                }
                return;
            }

            currentQuestionIndex++;
            showQuestion();
        }

        function lanjutQuiz() {
            resultEl.style.display = "none";
            quizContainer.style.display = "block";
            resetTrick();
            currentQuestionIndex++;
            showQuestion();
        }

        function showQuestion() {
            questionEl.innerText = questions[currentQuestionIndex];

            if (currentQuestionIndex === 2) setupTrick(btnYa, btnTidak);
            if (currentQuestionIndex === 5) setupTrick(btnTidak, btnYa);
        }

        function setupTrick(btnKabur, btnMembesar) {
            scaleMembesar = 1; 
            btnKabur.style.position = "fixed";
            btnKabur.style.zIndex = "9999";
            
            const rect = btnKabur.getBoundingClientRect();
            btnKabur.style.left = rect.left + "px";
            btnKabur.style.top = rect.top + "px";

            btnKabur.onmouseover = function(e) { runaway(e, btnKabur, btnMembesar); };
            btnKabur.ontouchstart = function(e) { runaway(e, btnKabur, btnMembesar); };
        }

        function runaway(e, btnKabur, btnMembesar) {
            if(e.type === 'touchstart') e.preventDefault(); 

            const safeWidth = window.innerWidth - btnKabur.offsetWidth - 20;
            const safeHeight = window.innerHeight - btnKabur.offsetHeight - 20;

            const randomX = Math.max(10, Math.floor(Math.random() * safeWidth));
            const randomY = Math.max(10, Math.floor(Math.random() * safeHeight));

            btnKabur.style.left = randomX + "px";
            btnKabur.style.top = randomY + "px";

            scaleMembesar += 0.8; 
            btnMembesar.style.transform = `scale(${scaleMembesar})`;
            btnMembesar.style.zIndex = "5000"; 
        }

        function resetTrick() {
            btnYa.style = "";
            btnTidak.style = "";
            btnYa.onmouseover = null;
            btnYa.ontouchstart = null;
            btnTidak.onmouseover = null;
            btnTidak.ontouchstart = null;
        }
    </script>

</body>
</html>
